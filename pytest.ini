[pytest]
pythonpath = .
testpaths = tests
addopts = -p no:warnings -W ignore::urllib3.exceptions.NotOpenSSLWarning -W ignore:.*LibreSSL.*:Warning
markers =
    fast: deterministic local fast-lane tests for changed files, directly affected contracts, evidence fixtures, and compile/import checks.
    phase_b: Phase B runtime governance contract tests for metadata-only runtime orchestration, scheduling, event, health, release, and evidence flow.
    phase_c: Phase C controlled-execution design tests, including simulator and human approval gateway metadata contracts.
    integration: local integration tests that verify cross-module contract continuity without provider, network, or production activation.
    security: security and fail-closed governance tests that must not be skipped to improve runtime.
    release: release-readiness validation that remains mandatory before human-terminal commit, PR readiness, post-merge, and main validation.
    critical: PR critical-path smoke and fail-closed guardrail tests that must run on every pull request.
    governance: governance-critical validation tests that must run on every pull request.
    regression: broader regression coverage for scheduled and manual full validation.
    slow: intentionally long-running tests reserved for scheduled/manual full regression unless explicitly selected.
    heavy: production-readiness deep scan tests reserved for scheduled/manual validation lanes.
    dependency: dependency-remediation validation tests for Dependabot and package-lock changes.
    resilience: governance resilience engineering tests for stress, contention, replay pressure, and fail-closed overload behavior.
    stress: bounded stress tests reserved for manual/scheduled resilience validation.
filterwarnings =
    ignore::urllib3.exceptions.NotOpenSSLWarning
    ignore:.*LibreSSL.*:Warning
