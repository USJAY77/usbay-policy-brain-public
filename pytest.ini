[pytest]
pythonpath = .
testpaths = tests
addopts = -p no:warnings -W ignore::urllib3.exceptions.NotOpenSSLWarning -W ignore:.*LibreSSL.*:Warning
markers =
    critical: PR critical-path smoke and fail-closed guardrail tests that must run on every pull request.
    governance: governance-critical validation tests that must run on every pull request.
    regression: broader regression coverage for scheduled and manual full validation.
    slow: intentionally long-running tests reserved for scheduled/manual full regression unless explicitly selected.
    heavy: production-readiness deep scan tests reserved for scheduled/manual validation lanes.
    dependency: dependency-remediation validation tests for Dependabot and package-lock changes.
filterwarnings =
    ignore::urllib3.exceptions.NotOpenSSLWarning
    ignore:.*LibreSSL.*:Warning
