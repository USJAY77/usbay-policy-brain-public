name: dependabot-governed-automerge

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "Dependabot PR number to evaluate"
        required: true
        type: string
  workflow_run:
    workflows:
      - production-readiness
    types: [completed]

permissions:
  actions: read
  checks: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  governed-dependabot-automerge:
    name: governed-dependabot-automerge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'pull_request'
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout trusted automation
        uses: actions/checkout@v4
actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve Dependabot PR number
        id: pr
        shell: bash
        env:
          DISPATCH_PR: ${{ inputs.pr }}
          WORKFLOW_RUN_PULL_REQUESTS: ${{ toJson(github.event.workflow_run.pull_requests) }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            test -n "${DISPATCH_PR}"
            echo "number=${DISPATCH_PR}" >> "$GITHUB_OUTPUT"
            echo "source=workflow_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          prs = json.loads(os.environ.get("WORKFLOW_RUN_PULL_REQUESTS") or "[]")
          if len(prs) != 1:
              raise SystemExit("DEPENDABOT_AUTOMERGE_PR_AMBIGUOUS")
          print(f"number={prs[0]['number']}")
          print(f"head_branch={prs[0]['head']['ref']}")
          print(f"head_sha={prs[0]['head']['sha']}")
          print("source=workflow_run")
          PY

      - name: Resolve canonical changed files and lineage recovery
        if: github.event_name == 'workflow_run'
        shell: bash
        env:
          EVENT_NAME: pull_request
          PR_BASE_SHA: ${{ github.event.workflow_run.pull_requests[0].base.sha }}
          PR_HEAD_SHA: ${{ github.event.workflow_run.pull_requests[0].head.sha }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 scripts/resolve_ci_changed_files.py \
            --output /tmp/dependabot-changed-files.txt \
            --audit-output /tmp/dependabot-lineage-reconciliation.json
          test -s /tmp/dependabot-lineage-reconciliation.json

      - name: Initialize manual lineage recovery audit
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/dependabot-lineage-reconciliation.json <<'JSON'
          {
            "lineage_schema": "usbay.ci_lineage_reconciliation.v1",
            "lineage_status": "CURRENT",
            "invalidation_status": "NOT_REQUIRED",
            "invalidation_reason": "manual_dispatch_uses_github_pr_checks",
            "tampering_assessment": "none",
            "stale_refs_expired": []
          }
          JSON
          test -s /tmp/dependabot-lineage-reconciliation.json

      - name: Determine governed Dependabot applicability
        id: applicability
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          WORKFLOW_SOURCE: ${{ steps.pr.outputs.source }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id || github.run_id }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_run" && "${HEAD_BRANCH}" != dependabot/* ]]; then
            python3 - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          def canonical(payload):
              return json.dumps(payload, sort_keys=True, separators=(",", ":"))

          def sha256_text(value):
              return hashlib.sha256(str(value or "").encode("utf-8")).hexdigest()

          timestamp = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          shared = {
              "schema": "usbay.dependabot_governed_automerge_applicability.v1",
              "applicable": False,
              "decision": "NOT_APPLICABLE",
              "reason_codes": ["NON_DEPENDABOT_WORKFLOW_RUN"],
              "pr_number": os.environ.get("PR_NUMBER", ""),
              "head_branch_hash": sha256_text(os.environ.get("HEAD_BRANCH", "")),
              "workflow_context_source": os.environ.get("WORKFLOW_SOURCE", ""),
              "workflow_run_id_hash": sha256_text(os.environ.get("WORKFLOW_RUN_ID", "")),
              "evaluated_at_utc": timestamp,
          }
          shared["audit_hash"] = sha256_text(canonical(shared))
          resolution = {
              "schema": "usbay.dependabot_pr_resolution.v1",
              "valid": False,
              "applicable": False,
              "reason_codes": ["NON_DEPENDABOT_WORKFLOW_RUN"],
              "applicability": shared,
              "audit_hash": shared["audit_hash"],
          }
          decision = {
              "schema": "usbay.dependabot_governed_auto_merge_decision.v1",
              "approved": False,
              "applicable": False,
              "allow_block_decision": "NOT_APPLICABLE",
              "reason_codes": ["NON_DEPENDABOT_WORKFLOW_RUN"],
              "blockers": [],
              "applicability": shared,
              "audit_hash": shared["audit_hash"],
          }
          Path("/tmp/dependabot-pr-resolution.json").write_text(json.dumps(resolution, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          Path("/tmp/dependabot-auto-merge-decision.json").write_text(json.dumps(decision, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print("DEPENDABOT_GOVERNED_AUTOMERGE_APPLICABLE=false")
          print("DEPENDABOT_GOVERNED_AUTOMERGE_REASON=NON_DEPENDABOT_WORKFLOW_RUN")
          print(f"DEPENDABOT_GOVERNED_AUTOMERGE_AUDIT_HASH={shared['audit_hash']}")
          PY
            echo "applicable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "DEPENDABOT_GOVERNED_AUTOMERGE_APPLICABLE=true"
          echo "applicable=true" >> "$GITHUB_OUTPUT"

      - name: Governed Dependabot recovery, validation, merge, and cleanup
        if: steps.applicability.outputs.applicable == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Required checks: audit-artifact-guard production-readiness governance-check policy-verification codeql-quality"
          python3 scripts/governed_dependabot_pr_automation.py \
            --pr "${{ steps.pr.outputs.number }}" \
            --expected-head-branch "${{ steps.pr.outputs.head_branch }}" \
            --expected-head-sha "${{ steps.pr.outputs.head_sha }}" \
            --workflow-context-source "${{ steps.pr.outputs.source }}" \
            --workflow-run-id "${{ github.event.workflow_run.id || github.run_id }}" \
            --lineage-diagnostics /tmp/dependabot-lineage-reconciliation.json \
            --resolution-output /tmp/dependabot-pr-resolution.json \
            --decision-output /tmp/dependabot-auto-merge-decision.json \
            --merge
          test -s /tmp/dependabot-pr-resolution.json
          test -s /tmp/dependabot-auto-merge-decision.json

      - name: Verify governed automerge audit outputs
        shell: bash
        run: |
          set -euo pipefail
          test -s /tmp/dependabot-pr-resolution.json
          test -s /tmp/dependabot-auto-merge-decision.json
