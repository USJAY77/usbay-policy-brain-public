name: codex-autofix-ci

on:
  push:
    branches: ["main", "test/codex-trigger"]
  pull_request:
    branches: ["main"]

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (CORRECT METHOD)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Debug installed packages
        run: |
          python -m pip list

      - name: Verify Python import path
        run: |
          echo "PWD=$(pwd)"
          ls -la
          PYTHONPATH=$(pwd) python -c "import sys; print(sys.path)"

      - name: Debug import paths
        run: |
          python -c "import os; print(os.getcwd())"
          PYTHONPATH=$(pwd) python -c "import utils.secret_provider; print('OK')"
          PYTHONPATH=$(pwd) python -c "import runtime.command_model; print('runtime.command_model OK')"

      - name: Run tests (CORRECT METHOD)
        run: PYTHONPATH=$(pwd) python -m pytest -q
