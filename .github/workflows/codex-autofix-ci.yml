name: Codex Auto-Fix on CI Failure (USBAY Governed)

on:
  push:
    branches:
      - main
      - test/codex-trigger

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install requests pytest

      - name: Run tests (fail allowed)
        run: |
          pytest
        continue-on-error: true

      - name: Run USBAY Codex analysis
        if: failure()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          python << 'PY'
          import json
          import os
          import subprocess
          from pathlib import Path
          import requests

          # --- ALWAYS create baseline artifact ---
          Path("artifacts/run_status.txt").write_text("started", encoding="utf-8")

          api_key = os.environ.get("OPENAI_API_KEY")
          if not api_key:
              Path("artifacts/error.txt").write_text("Missing API key", encoding="utf-8")
              exit(0)

          def run_cmd(cmd):
              try:
                  result = subprocess.run(
                      cmd,
                      capture_output=True,
                      text=True
                  )
                  return result.stdout + "\n" + result.stderr
              except Exception as e:
                  return str(e)

          def safe_read(path):
              p = Path(path)
              if not p.exists():
                  return ""
              try:
                  return p.read_text(encoding="utf-8")[:10000]
              except:
                  return ""

          pytest_output = run_cmd(["pytest", "-q"])
          git_diff = run_cmd(["git", "diff"])
          readme = safe_read("README.md")

          prompt = f"""
          You are a governance-controlled CI assistant.

          Goal:
          Identify the smallest SAFE fix for the failing repository.

          HARD RULES:
          - NEVER modify policy/, governance/, audit/, enforcement/
          - NEVER disable tests
          - PRESERVE fail-closed behavior
          - MINIMAL change only
          - If unsafe → say unsafe

          RETURN STRICT JSON:

          {{
            "summary": "...",
            "safe_to_apply": true,
            "files_to_change": ["file.py"],
            "proposed_patch": "...",
            "reasoning": "..."
          }}

          CONTEXT:

          TEST OUTPUT:
          {pytest_output}

          DIFF:
          {git_diff}

          README:
          {readme}
          """

          response = requests.post(
              "https://api.openai.com/v1/responses",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              },
              json={
                  "model": "gpt-5.4",
                  "input": prompt
              },
              timeout=180
          )

          Path("artifacts/http_status.txt").write_text(str(response.status_code))

          Path("artifacts/raw_response.json").write_text(
              response.text,
              encoding="utf-8"
          )

          if response.status_code >= 400:
              Path("artifacts/error.txt").write_text(
                  "API ERROR",
                  encoding="utf-8"
              )
              exit(0)

          data = response.json()

          output_text = ""
          for item in data.get("output", []):
              if item.get("type") == "message":
                  for c in item.get("content", []):
                      if c.get("type") == "output_text":
                          output_text += c.get("text", "")

          Path("artifacts/output.txt").write_text(output_text, encoding="utf-8")

          try:
              parsed = json.loads(output_text)
              Path("artifacts/parsed.json").write_text(
                  json.dumps(parsed, indent=2),
                  encoding="utf-8"
              )
          except Exception as e:
              Path("artifacts/error.txt").write_text(
                  f"JSON PARSE ERROR: {e}",
                  encoding="utf-8"
              )
              exit(0)

          forbidden = ["policy/", "governance/", "audit/", "enforcement/"]

          files = parsed.get("files_to_change", [])
          blocked = [f for f in files if any(f.startswith(x) for x in forbidden)]

          validation = {
              "safe": parsed.get("safe_to_apply", False),
              "blocked_paths": blocked,
              "files": files
          }

          Path("artifacts/validation.json").write_text(
              json.dumps(validation, indent=2),
              encoding="utf-8"
          )

          Path("artifacts/run_status.txt").write_text("completed", encoding="utf-8")
          PY

      - name: Upload USBAY audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: usbay-codex-audit
          path: artifacts/
          if-no-files-found: error

      - name: Create PR (analysis only)
        if: failure()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "USBAY: Codex analysis log"
          title: "USBAY Codex Analysis"
          body: |
            USBAY Governance Analysis completed.

            Artifacts contain:
            - raw AI response
            - parsed decision
            - validation result

            No automatic code changes applied.
          branch: usbay/codex-analysis-${{ github.run_id }}
