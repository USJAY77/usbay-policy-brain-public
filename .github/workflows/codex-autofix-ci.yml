name: codex-autofix-ci

on:
  push:
    branches: ["main", "test/codex-trigger"]
  pull_request:
    branches: ["main"]

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug working dir
        run: |
          pwd
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (FORCED CORRECT)
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir fastapi pytest uvicorn httpx

      - name: Verify httpx
        run: |
          python -c "import httpx; print('httpx OK')"

      - name: Run tests
        run: |
          PYTHONPATH=$(pwd) pytest -q
