name: Codex Auto-Fix on CI Failure

on:
  push:
    branches:
      - main
      - test/codex-trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install requests pytest

      - name: Run tests
        run: |
          pytest

      - name: Run Codex autofix
        if: failure()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Running Codex fix via API"

          python << 'EOF'
          import os
          import requests

          api_key = os.environ.get("OPENAI_API_KEY")
          if not api_key:
              raise SystemExit("OPENAI_API_KEY is missing")

          response = requests.post(
              "https://api.openai.com/v1/responses",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
              json={
                  "model": "gpt-5.4",
                  "input": (
                      "The CI tests failed. "
                      "Suggest a minimal, safe fix for the repository. "
                      "Do not bypass tests. "
                      "Preserve governance and fail-closed behavior."
                  ),
              },
              timeout=120,
          )

          print(response.status_code)
          print(response.text)

          if response.status_code >= 400:
              raise SystemExit("OpenAI API request failed")
          EOF

      - name: Create Pull Request with fix
        if: failure()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "fix: codex auto-fix for failing CI"
          title: "Codex Auto-Fix"
          body: "Automated fix generated after CI failure."
          branch: codex/autofix-${{ github.run_id }}
