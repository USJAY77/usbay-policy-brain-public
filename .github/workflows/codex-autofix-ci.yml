name: USBAY Codex Auto-Fix (Governed)

on:
  push:
    branches:
      - main
      - test/codex-trigger

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --editable .
          python -m pip install pytest requests

      - name: Prepare environment
        shell: bash
        run: |
          mkdir -p artifacts
          echo "started" > artifacts/run_status.txt
          touch artifacts/pytest_output.txt

      - name: Run tests (fail allowed)
        shell: bash
        run: |
          set -eo pipefail

          # SAFE PYTHONPATH
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"

          # ensure artifacts exist
          mkdir -p artifacts
          touch artifacts/pytest_output.txt

          # run tests
          pytest -q > artifacts/pytest_output.txt 2>&1 || true

          # print output
          cat artifacts/pytest_output.txt

      - name: Run USBAY Codex analysis
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import json
          import os
          from pathlib import Path

          import requests

          Path("artifacts").mkdir(exist_ok=True)

          api_key = os.getenv("OPENAI_API_KEY")
          if not api_key:
              Path("artifacts/error.txt").write_text("Missing OPENAI_API_KEY")
              raise SystemExit(0)

          pytest_file = Path("artifacts/pytest_output.txt")
          if pytest_file.exists():
              pytest_output = pytest_file.read_text(errors="ignore")
          else:
              pytest_output = "pytest output missing"

          prompt = f"Analyze this test output and propose a minimal safe fix: {pytest_output[:2000]}"

          r = requests.post(
              "https://api.openai.com/v1/responses",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
              json={
                  "model": "gpt-5.4",
                  "input": prompt,
              },
              timeout=180,
          )

          Path("artifacts/http_status.txt").write_text(str(r.status_code))
          Path("artifacts/raw_response.json").write_text(r.text)

          if r.status_code >= 400:
              Path("artifacts/error.txt").write_text("API ERROR")
              raise SystemExit(0)

          data = r.json()

          text = ""
          for item in data.get("output", []):
              if item.get("type") == "message":
                  for c in item.get("content", []):
                      if c.get("type") == "output_text":
                          text += c.get("text", "")

          Path("artifacts/output.txt").write_text(text)

          try:
              parsed = json.loads(text)
              Path("artifacts/parsed.json").write_text(
                  json.dumps(parsed, indent=2)
              )
          except Exception as e:
              Path("artifacts/error.txt").write_text(str(e))
          PY

      - name: Upload USBAY audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: usbay-codex-audit
          path: artifacts/
          if-no-files-found: error
