name: Codex Auto-Fix on CI Failure

on:
  push:
    branches:
      - main
      - test/codex-trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Run tests (capture failure)
        id: tests
        continue-on-error: true
        run: |
          pytest || exit 1

      - name: Run Codex autofix
        if: failure()
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4
          prompt: |
            The CI tests failed.
            Fix the root cause with minimal, safe changes.
            Do not bypass tests.
            Preserve governance and fail-closed behavior.

      - name: Create Pull Request with fix
        if: failure()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "fix: codex auto-fix for failing CI"
          title: "Codex Auto-Fix"
          body: "Automated fix generated after CI failure."
          branch: codex/autofix-${{ github.run_id }}
