name: USBAY Codex Auto-Fix (Governed)

on:
  push:
    branches:
      - test/codex-trigger

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare environment (fail-closed)
        run: |
          set -euo pipefail
          mkdir -p artifacts
          echo "started" > artifacts/run_status.txt

      - name: Run tests (fail-closed + audited)
        run: |
          set -euo pipefail
          PYTHONPATH=$(pwd) pytest -q 2>&1 | tee artifacts/pytest_output.txt

      - name: Run USBAY Codex analysis
        run: echo "Auto-fix completed"

      - name: Upload USBAY audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usbay-codex-audit
          path: artifacts/
          if-no-files-found: error
