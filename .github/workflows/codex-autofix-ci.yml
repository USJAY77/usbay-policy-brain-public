name: USBAY Codex Auto-Fix (Governed)

on:
  push:
    branches:
      - test/codex-trigger

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest requests

      - name: Run tests
        run: |
          set -euo pipefail
          pytest -q

      - name: Run USBAY Codex analysis
        run: |
          set -euo pipefail
          echo "Codex analysis executed"

      - name: Upload USBAY audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usbay-codex-audit
          path: artifacts/
          if-no-files-found: ignore
