name: Codex Auto-Fix on CI Failure

on:
  push:
    branches:
      - main
      - test/codex-trigger

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install requests pytest

      - name: Run tests
        run: |
          pytest
        continue-on-error: true

      - name: Run Codex autofix
        if: failure()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          python << 'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          import requests

          api_key = os.environ.get("OPENAI_API_KEY")
          if not api_key:
              raise SystemExit("OPENAI_API_KEY is missing")

          def safe_read(path: str, limit: int = 12000) -> str:
              p = Path(path)
              if not p.exists() or not p.is_file():
                  return ""
              try:
                  content = p.read_text(encoding="utf-8")
              except Exception:
                  return ""
              return content[:limit]

          def run_cmd(cmd: list[str]) -> str:
              try:
                  result = subprocess.run(
                      cmd,
                      check=False,
                      capture_output=True,
                      text=True,
                  )
                  return (result.stdout + "\n" + result.stderr).strip()
              except Exception as exc:
                  return f"command failed: {exc}"

          pytest_output = run_cmd(["pytest", "-q"])
          git_diff = run_cmd(["git", "diff", "--", ".", ":(exclude).venv"])
          readme = safe_read("README.md")
          workflow = safe_read(".github/workflows/codex-autofix-ci.yml")

          prompt = f"""
          You are a governance-constrained CI assistant.

          Goal:
          Identify the smallest safe fix for the failing repository.

          Hard constraints:
          - Do NOT propose bypassing or disabling tests.
          - Do NOT modify files under policy/, governance/, audit/, enforcement/.
          - Do NOT modify GitHub secrets, billing, or approvals.
          - Preserve fail-closed behavior.
          - Prefer the smallest diff possible.
          - If no safe fix is possible, say so.

          Return STRICT JSON with this exact schema:
          {{
            "summary": "short explanation",
            "safe_to_apply": true,
            "files_to_change": ["path1", "path2"],
            "proposed_patch": "unified diff or plain explanation",
            "reasoning": "short reasoning"
          }}

          Repository context:

          README.md:
          {readme}

          Current workflow:
          {workflow}

          Pytest output:
          {pytest_output}

          Git diff:
          {git_diff}
          """

          response = requests.post(
              "https://api.openai.com/v1/responses",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
              json={
                  "model": "gpt-5.4",
                  "input": prompt,
              },
              timeout=180,
          )

          print(response.status_code)
          print(response.text)

          Path("artifacts/codex_raw_response.json").write_text(
              response.text, encoding="utf-8"
          )

          if response.status_code >= 400:
              raise SystemExit("OpenAI API request failed")

          data = response.json()

          output_text = ""
          for item in data.get("output", []):
              if item.get("type") == "message":
                  for content in item.get("content", []):
                      if content.get("type") == "output_text":
                          output_text += content.get("text", "")

          Path("artifacts/codex_output_text.txt").write_text(
              output_text, encoding="utf-8"
          )

          try:
              parsed = json.loads(output_text)
          except Exception as exc:
              Path("artifacts/codex_validation.txt").write_text(
                  f"INVALID_JSON: {exc}", encoding="utf-8"
              )
              raise SystemExit("Codex output is not valid JSON")

          forbidden_prefixes = (
              "policy/",
              "governance/",
              "audit/",
              "enforcement/",
          )

          files_to_change = parsed.get("files_to_change", [])
          bad_paths = [
              p for p in files_to_change
              if isinstance(p, str) and p.startswith(forbidden_prefixes)
          ]

          validation = {
              "safe_to_apply": bool(parsed.get("safe_to_apply", False)),
              "files_to_change": files_to_change,
              "forbidden_paths_detected": bad_paths,
          }

          Path("artifacts/codex_parsed.json").write_text(
              json.dumps(parsed, indent=2), encoding="utf-8"
          )
          Path("artifacts/codex_validation.json").write_text(
              json.dumps(validation, indent=2), encoding="utf-8"
          )

          if bad_paths:
              raise SystemExit(f"Forbidden paths detected: {bad_paths}")

          if not validation["safe_to_apply"]:
              raise SystemExit("Codex marked this as unsafe to apply")
          PY

      - name: Upload Codex artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-autofix-evidence
          path: artifacts/
          if-no-files-found: error

      - name: Create Pull Request with fix placeholder
        if: failure()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: record codex autofix analysis"
          title: "Codex Auto-Fix Analysis"
          body: |
            Automated Codex analysis completed.
            Review uploaded artifact: codex-autofix-evidence
            No direct code change was applied automatically.
          branch: codex/autofix-${{ github.run_id }}
