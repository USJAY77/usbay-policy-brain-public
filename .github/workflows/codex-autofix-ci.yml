# .github/workflows/codex-autofix-ci.yml
name: Codex Auto-Fix on CI Failure

on:
  workflow_run:
    workflows:
      - "policy-verification"
      - "audit-governance"
      - "audit-verify"
      - "governance-check"
      - "USBAY Governance PR Check"
    types: [completed]
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      FAILED_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Checkout failing commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FAILED_HEAD_SHA }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install repo dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Codex autofix
        uses: openai/codex-action@v1
        with:
          prompt: |
            The previous CI workflow failed on branch ${FAILED_HEAD_BRANCH}.
            Fix only the concrete failure causing the failed run.

            Rules:
            - Minimal diff only
            - Do not weaken validation
            - Do not disable tests
            - Do not bypass fail-closed behavior
            - Prefer fixing workflow/runtime alignment before app code
            - Keep imports consistent with:
              export PYTHONPATH=$(pwd)/python

            After changes, run:
            export PYTHONPATH=$(pwd)/python
            ./scripts/test.sh

            If tests pass, prepare the patch for commit.
          model: gpt-5.2-codex

      - name: Verify tests after Codex
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH=$(pwd)/python
          ./scripts/test.sh

      - name: Create Pull Request with fix
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "fix(ci): Codex autofix for failed workflow"
          branch: codex/autofix-${{ github.run_id }}
          title: "fix(ci): Codex autofix for failed workflow"
          body: |
            Automated Codex fix for failed workflow run.

            Source workflow: ${{ github.event.workflow_run.name }}
            Failed branch: ${{ env.FAILED_HEAD_BRANCH }}
            Failed SHA: ${{ env.FAILED_HEAD_SHA }}

            Validation performed:
            - export PYTHONPATH=$(pwd)/python
            - ./scripts/test.sh
