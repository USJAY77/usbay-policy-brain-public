name: USBAY Codex Auto-Fix (Governed)

on:
  push:
    branches:
      - main
      - test/codex-trigger

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --editable .
          python -m pip install pytest requests

      - name: Prepare environment
        shell: bash
        run: |
          mkdir -p artifacts
          echo "started" > artifacts/run_status.txt
          touch artifacts/pytest_output.txt

      - name: Run tests (fail allowed)
        shell: bash
        run: |
          set -eo pipefail
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"
          mkdir -p artifacts
          touch artifacts/pytest_output.txt
          pytest -q > artifacts/pytest_output.txt 2>&1 || true
          cat artifacts/pytest_output.txt

      - name: Run USBAY Codex analysis
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          python << 'PY'
          import json
          import os
          from pathlib import Path

          import requests

          Path("artifacts").mkdir(exist_ok=True)

          api_key = os.getenv("OPENAI_API_KEY")
          if not api_key:
              Path("artifacts/error.txt").write_text(
                  "Missing OPENAI_API_KEY",
                  encoding="utf-8"
              )
              raise SystemExit(0)

          pytest_output_path = Path("artifacts/pytest_output.txt")
          if pytest_output_path.exists():
              pytest_output = pytest_output_path.read_text(
                  encoding="utf-8",
                  errors="ignore"
              )
          else:
              pytest_output = "pytest output file not found"

          prompt = f"""
Analyze this failing test output and propose a minimal safe fix.

RULES:
- Do NOT modify governance logic, policy logic, or audit semantics
- Do NOT remove tests
- Minimal safe fix only
- Preserve fail-closed behavior

OUTPUT JSON:
{{
  "summary": "...",
  "safe_to_apply": true,
  "files_to_change": [],
  "reasoning": "..."
}}

TEST OUTPUT:
{pytest_output}
"""

          response = requests.post(
              "https://api.openai.com/v1/responses",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
              json={
                  "model": "gpt-5.4",
                  "input": prompt,
              },
              timeout=180,
          )

          Path("artifacts/http_status.txt").write_text(
              str(response.status_code),
              encoding="utf-8"
          )
          Path("artifacts/raw_response.json").write_text(
              response.text,
              encoding="utf-8"
          )

          if response.status_code >= 400:
              Path("artifacts/error.txt").write_text(
                  "API ERROR",
                  encoding="utf-8"
              )
              raise SystemExit(0)

          data = response.json()

          text = ""
          for item in data.get("output", []):
              if item.get("type") == "message":
                  for content in item.get("content", []):
                      if content.get("type") == "output_text":
                          text += content.get("text", "")

          Path("artifacts/output.txt").write_text(
              text,
              encoding="utf-8"
          )

          try:
              parsed = json.loads(text)
              Path("artifacts/parsed.json").write_text(
                  json.dumps(parsed, indent=2),
                  encoding="utf-8"
              )
          except Exception as exc:
              Path("artifacts/error.txt").write_text(
                  f"JSON ERROR: {exc}",
                  encoding="utf-8"
              )
          PY

      - name: Upload USBAY audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: usbay-codex-audit
          path: artifacts/
          if-no-files-found: error

      - name: Create PR (analysis only)
        if: always()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "USBAY: Codex analysis log"
          title: "USBAY Codex Analysis"
          body: |
            USBAY Governance Analysis executed.

            Check artifacts for:
            - test output
            - AI reasoning
            - safe fix proposal

            No automatic changes applied.
          branch: usbay/codex-analysis-${{ github.run_id }}
