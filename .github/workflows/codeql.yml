name: USBAY Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  USBAY_Security_Scan:
    name: USBAY Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir bandit safety pip-audit

      - name: Python security scan (Bandit)
        run: |
          echo "Running Bandit security scan..."
          bandit -r . || true

      - name: Dependency vulnerability scan (Safety)
        run: |
          echo "Running dependency vulnerability scan..."
          safety scan --full-report || true           

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          echo "Running pip-audit dependency scan..."
          python -m pip freeze > local-freeze.txt
          PIPAPI_PYTHON_LOCATION="$(python -c 'import sys; print(sys.executable)')" \
            python -m pip_audit | tee pip-audit.txt

      - name: Upload dependency audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-evidence
          path: |
            local-freeze.txt
            pip-audit.txt
          if-no-files-found: error
