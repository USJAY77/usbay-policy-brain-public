name: governance-resilience

on:
  workflow_dispatch: {}
  schedule:
    - cron: "43 4 * * 0"

permissions:
  contents: read

jobs:
  governance-resilience:
    name: governance-resilience
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-ci.txt
          python -m pytest --version

      - name: Run governance resilience tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          python scripts/run_bounded_validation.py \
            --lane full_regression \
            --timeout-seconds 2400 \
            --evidence-output evidence/governance-resilience-validation.json \
            -- python -m pytest -m resilience -vv
