name: audit-artifact-guard

on:
  pull_request: {}
  push: {}

permissions:
  contents: read

jobs:
  audit-artifact-guard:
    name: audit-artifact-guard
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Block committed runtime audit artifacts
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 scripts/resolve_ci_changed_files.py \
            --output changed_files.txt \
            --audit-output lineage-reconciliation.json

          if grep -E '^(python/audit/logs/|python/evidence/|python/exports/)' changed_files.txt; then
            echo "FAIL-CLOSED: audit artifacts detected"
            exit 1
          fi

          echo "No committed runtime audit/evidence/export artifacts detected."
